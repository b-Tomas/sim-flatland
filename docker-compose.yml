services:
  flatland-nav2:
    build: .
    image: flatland-nav2:jazzy
    container_name: flatland_nav2
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=/tmp/runtime
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      # GPU devices (required for hardware-accelerated rendering)
      - /dev/dri:/dev/dri
      # X11 socket
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 auth
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:ro
      # Wayland socket (mount host socket into container runtime dir)
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-0}:/tmp/runtime/${WAYLAND_DISPLAY:-wayland-0}:ro
      # Map and config overrides from host
      - ./maps:/ros2_ws/maps:ro
      - ./worlds:/ros2_ws/worlds:ro
      - ./config:/ros2_ws/src/flatland_nav2_bringup/config:ro
    network_mode: host
    stdin_open: true
    tty: true
    # Allow access to GPU render nodes (226 = /dev/dri major number)
    device_cgroup_rules:
      - 'c 226:* rmw'
    command: ["--with-rviz"]
    # For NVIDIA GPU support, uncomment the next line (requires nvidia-container-toolkit):
    #runtime: nvidia

  # Run rviz in a separate container (activate with: docker compose --profile rviz-separate up rviz)
  rviz:
    image: flatland-nav2:jazzy
    container_name: flatland_rviz
    profiles: ["rviz-separate"]
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=/tmp/runtime
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /dev/dri:/dev/dri
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:ro
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-0}:/tmp/runtime/${WAYLAND_DISPLAY:-wayland-0}:ro
      - ./config:/ros2_ws/src/flatland_nav2_bringup/config:ro
    network_mode: host
    device_cgroup_rules:
      - 'c 226:* rmw'
    command: ["--rviz-only"]
      #runtime: nvidia
